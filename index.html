<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="main-title">Software Cost Estimation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #374151; padding-bottom: 15px;">
        <h1 style="margin: 0;" data-i18n="main-title">Software Cost Estimation Tool</h1>
        <div>
            <select id="langSelect" style="width: auto; margin: 0; padding: 8px 15px;">
                <option value="en">English</option>
                <option value="ar">العربية</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
            </select>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('loc', event)">LOC/KLOC</button>
        <button class="tab-btn" onclick="showTab('fp', event)">Function Point</button>
        <button class="tab-btn" onclick="showTab('op', event)">Object Point</button>
        <button class="tab-btn" onclick="showTab('cocomo', event)">COCOMO</button>
        <button class="tab-btn" onclick="showTab('ucp', event)">Use Case Point</button>
    </div>

    <div class="tab-content active" id="loc">
        <h2 data-i18n="loc-heading">LOC / KLOC Estimation</h2>
        <input type="number" id="locInput" data-i18n-placeholder="placeholder-loc">
        <input type="number" id="locProductivity" data-i18n-placeholder="placeholder-productivity">
        <input type="number" id="locCost" data-i18n-placeholder="placeholder-cost-month">
        <button onclick="calculateLOC()" data-i18n="btn-calculate">Calculate</button>
        <div class="result" id="locResult"></div>
    </div>

    <div class="tab-content" id="fp">
        <h2 data-i18n="fp-heading">Function Point</h2>
        <h3 data-i18n="sub-inputs">User Inputs</h3>
        <input type="number" id="fpInputs" data-i18n-placeholder="placeholder-inputs-count">
        <select id="fpInputsComplexity">
            <option value="simple" data-i18n="opt-simple">Simple</option>
            <option value="average" data-i18n="opt-average">Average</option>
            <option value="complex" data-i18n="opt-complex">Complex</option>
        </select>

        <h3 data-i18n="sub-outputs">User Outputs</h3>
        <input type="number" id="fpOutputs" data-i18n-placeholder="placeholder-outputs-count">
        <select id="fpOutputsComplexity">
            <option value="simple" data-i18n="opt-simple">Simple</option>
            <option value="average" data-i18n="opt-average">Average</option>
            <option value="complex" data-i18n="opt-complex">Complex</option>
        </select>

        <h3 data-i18n="sub-inquiries">User Inquiries</h3>
        <input type="number" id="fpInquiries" data-i18n-placeholder="placeholder-inquiries-count">
        <select id="fpInquiriesComplexity">
            <option value="simple" data-i18n="opt-simple">Simple</option>
            <option value="average" data-i18n="opt-average">Average</option>
            <option value="complex" data-i18n="opt-complex">Complex</option>
        </select>

        <h3 data-i18n="sub-files">Files</h3>
        <input type="number" id="fpFiles" data-i18n-placeholder="placeholder-files-count">
        <select id="fpFilesComplexity">
            <option value="simple" data-i18n="opt-simple">Simple</option>
            <option value="average" data-i18n="opt-average">Average</option>
            <option value="complex" data-i18n="opt-complex">Complex</option>
        </select>

        <h3 data-i18n="sub-interfaces">External Interfaces</h3>
        <input type="number" id="fpInterfaces" data-i18n-placeholder="placeholder-interfaces-count">
        <select id="fpInterfacesComplexity">
            <option value="simple" data-i18n="opt-simple">Simple</option>
            <option value="average" data-i18n="opt-average">Average</option>
            <option value="complex" data-i18n="opt-complex">Complex</option>
        </select>

        <input type="number" id="fpFactor" data-i18n-placeholder="placeholder-factor">
        <input type="number" id="fpCost" data-i18n-placeholder="placeholder-cost-month">
        <button onclick="calculateFP()" data-i18n="btn-calculate">Calculate</button>
        <div class="result" id="fpResult"></div>
    </div>

    <div class="tab-content" id="op">
        <h2 data-i18n="op-heading">Object Point</h2>
        <h3 data-i18n="sub-screens">Screens</h3>
        <input type="number" id="opScreens" data-i18n-placeholder="placeholder-screens-count">
        <select id="opScreensComplexity">
            <option value="simple" data-i18n="opt-simple">Simple</option>
            <option value="medium" data-i18n="opt-medium">Medium</option>
            <option value="difficult" data-i18n="opt-difficult">Difficult</option>
        </select>

        <h3 data-i18n="sub-reports">Reports</h3>
        <input type="number" id="opReports" data-i18n-placeholder="placeholder-reports-count">
        <select id="opReportsComplexity">
            <option value="simple" data-i18n="opt-simple">Simple</option>
            <option value="medium" data-i18n="opt-medium">Medium</option>
            <option value="difficult" data-i18n="opt-difficult">Difficult</option>
        </select>

        <input type="number" id="opReuse" data-i18n-placeholder="placeholder-reuse">
        <input type="number" id="opProdRate" data-i18n-placeholder="placeholder-productivity">
        <input type="number" id="opCost" data-i18n-placeholder="placeholder-cost-month">
        <button onclick="calculateOP()" data-i18n="btn-calculate">Calculate</button>
        <div class="result" id="opResult"></div>
    </div>

    <div class="tab-content" id="cocomo">
        <h2 data-i18n="cocomo-heading">COCOMO Model</h2>
        <select id="cocomoMode">
            <option value="organic" data-i18n="opt-organic">Organic</option>
            <option value="semidetached" data-i18n="opt-semidetached">Semi-Detached</option>
            <option value="embedded" data-i18n="opt-embedded">Embedded</option>
        </select>
        <input type="number" id="cocomoKLOC" data-i18n-placeholder="placeholder-loc">
        <input type="number" id="cocomoCost" data-i18n-placeholder="placeholder-cost-month">
        <button onclick="calculateCOCOMO()" data-i18n="btn-calculate">Calculate</button>
        <div class="result" id="cocomoResult"></div>
    </div>

    <div class="tab-content" id="ucp">
        <h2 data-i18n="ucp-heading">Use Case Point</h2>
        <h3 data-i18n="sub-actors">Actors</h3>
        <input type="number" id="simpleActors" data-i18n-placeholder="placeholder-s-actors">
        <input type="number" id="averageActors" data-i18n-placeholder="placeholder-a-actors">
        <input type="number" id="complexActors" data-i18n-placeholder="placeholder-c-actors">

        <h3 data-i18n="sub-usecases">Use Cases</h3>
        <input type="number" id="simpleUC" data-i18n-placeholder="placeholder-s-uc">
        <input type="number" id="averageUC" data-i18n-placeholder="placeholder-a-uc">
        <input type="number" id="complexUC" data-i18n-placeholder="placeholder-c-uc">

        <input type="number" id="technicalFactor" data-i18n-placeholder="placeholder-tech-factor">
        <input type="number" id="environmentFactor" data-i18n-placeholder="placeholder-env-factor">
        <input type="number" id="productivityFactor" data-i18n-placeholder="placeholder-productivity">
        <input type="number" id="ucpCost" data-i18n-placeholder="placeholder-cost-month">
        <button onclick="calculateUCP()" data-i18n="btn-calculate">Calculate</button>
        <div class="result" id="ucpResult"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
